<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F2EA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F2EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2D55;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond sombre arrondi -->
  <rect width="32" height="32" rx="8" fill="#0D0D0D"/>

  <!-- Boucle du lasso (ovale incliné) -->
  <ellipse
    cx="14" cy="13"
    rx="7" ry="5"
    fill="none"
    stroke="url(#loopGrad)"
    stroke-width="2.2"
    transform="rotate(-15, 14, 13)"
  />

  <!-- Nœud du lasso -->
  <circle cx="14" cy="18.5" r="1.4" fill="#FF2D55"/>

  <!-- Corde qui descend et part en diagonale -->
  <path
    d="M14 19.9 Q13 23 17 26 Q19 27.5 21 27"
    fill="none"
    stroke="url(#ropeGrad)"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Petite boucle terminale de la corde -->
  <circle cx="21.5" cy="26.5" r="1.2" fill="none" stroke="#00F2EA" stroke-width="1.6"/>
</svg>
